# SPDX-License-Identifier: Apache-2.0

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LC_ALL: C

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install verification dependencies
        run: |
          sudo apt-get update

          sudo apt-get install \
            --yes \
            --no-install-recommends \
            build-essential \
            bzip2 \
            curl \
            dash \
            shellcheck

      - name: Build compatible test BusyBox
        run: |
          ci/build-test-busybox.sh \
            "$RUNNER_TEMP/busybox"

      - name: Run complete verification interface
        run: |
          make check \
            BUSYBOX="$RUNNER_TEMP/busybox"
